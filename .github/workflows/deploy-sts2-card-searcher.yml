name: Deploy STS2 Card Searcher to GitHub Pages

# Manual by default so it won't accidentally replace any existing Pages site in this repo.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-sts2-card-searcher
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sts2-card-searcher/package-lock.json

      - name: Install dependencies
        working-directory: sts2-card-searcher
        run: npm ci

      - name: Build site
        working-directory: sts2-card-searcher
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback
        run: cp sts2-card-searcher/dist/index.html sts2-card-searcher/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sts2-card-searcher/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
